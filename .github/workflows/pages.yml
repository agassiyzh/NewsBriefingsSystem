name: CI and GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Run tests
        run: python -m pytest -q tests

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.9'
          extended: false

      - name: Enable production feedback
        if: ${{ vars.NEWSROOM_FEEDBACK_WORKER_BASE_URL != '' }}
        env:
          NEWSROOM_FEEDBACK_WORKER_BASE_URL: ${{ vars.NEWSROOM_FEEDBACK_WORKER_BASE_URL }}
        run: python scripts/configure_hugo_feedback.py

      - name: Show feedback build mode
        run: |
          if [ -n "${{ vars.NEWSROOM_FEEDBACK_WORKER_BASE_URL }}" ]; then
            echo "Feedback enabled for this Pages build."
          else
            echo "Feedback disabled: NEWSROOM_FEEDBACK_WORKER_BASE_URL repository variable is not set."
          fi

      - name: Build site
        working-directory: site
        run: hugo --minify --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
